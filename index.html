<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Userscript Ultra Cleaner Pro</title>
    <style>
        :root {
            --bg: #f3f4f6;
            --primary: #2563eb;
            --secondary: #10b981;
            --border: #d1d5db;
            --editor-bg: #ffffff;
            --line-num-bg: #f8fafc;
            --line-num-text: #94a3b8;
            --lh: 18px; 
        }
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; font-family: sans-serif; background-color: var(--bg); }
        body { display: flex; flex-direction: column; padding: 10px; box-sizing: border-box; }

        /* Header & Settings */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .settings {
            background: white; padding: 8px 12px; border-radius: 8px;
            display: flex; gap: 12px; margin-bottom: 10px; border: 1px solid var(--border);
            flex-wrap: wrap; box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        label { font-size: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 4px; white-space: nowrap; }

        /* Main Editor Layout */
        .main { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; flex: 1; min-height: 0; }
        @media (max-width: 768px) { .main { grid-template-columns: 1fr; } }

        .pane { display: flex; flex-direction: column; min-height: 0; background: white; border-radius: 8px; border: 1px solid var(--border); overflow: hidden; }
        .bar { display: flex; justify-content: space-between; padding: 5px 10px; background: #1e293b; color: #cbd5e1; font-size: 10px; font-weight: bold; }

        .editor-container { flex: 1; position: relative; display: flex; overflow: hidden; }
        .line-numbers-wrapper { width: 42px; background: var(--line-num-bg); border-right: 1px solid var(--border); overflow: hidden; position: relative; pointer-events: none; }
        .line-numbers-content { position: absolute; top: 0; width: 100%; padding: 10px 0; text-align: right; font-family: monospace; font-size: 11px; line-height: var(--lh); color: var(--line-num-text); will-change: transform; }
        .line-numbers-content span { display: block; padding-right: 5px; }

        textarea { flex: 1; border: none; padding: 10px; font-family: 'Consolas', monospace; font-size: 12px; line-height: var(--lh); outline: none; background: transparent; resize: none; white-space: pre; overflow: auto; box-sizing: border-box; }

        /* Modal Settings */
        #modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 100; justify-content: center; align-items: center;
        }
        .modal {
            background: white; width: 90%; max-width: 600px; max-height: 80vh;
            border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
        }
        .modal-header { padding: 15px; border-bottom: 1px solid var(--border); background: #f9fafb; display: flex; justify-content: space-between; align-items: center; }
        .modal-body { flex: 1; overflow-y: auto; padding: 10px; }
        .modal-footer { padding: 12px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }
        
        .comment-item {
            display: flex; gap: 10px; padding: 8px; border-bottom: 1px solid #eee; font-size: 12px; align-items: flex-start;
        }
        .comment-item:hover { background: #f0f7ff; }
        .comment-text { font-family: monospace; color: #475569; word-break: break-all; }

        .footer { display: flex; justify-content: center; gap: 10px; padding: 10px 0; }
        button { padding: 10px 20px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-main { background: var(--primary); color: white; }
        .btn-copy { background: var(--secondary); color: white; }
        .btn-cancel { background: #e5e7eb; color: #374151; }
        button:active { transform: scale(0.98); }
    </style>
</head>
<body>

<div class="header">
    <h1 style="font-size: 0.9rem; margin:0; color:#475569;">Userscript Cleaner Pro <span id="status" style="color:var(--primary); font-weight:bold; margin-left:10px;">Ready</span></h1>
</div>

<div class="settings">
    <label><input type="checkbox" id="fix-lines" checked> 行を正す</label>
    <label><input type="checkbox" id="remove-comments" checked> コメント選択削除</label>
    <label><input type="checkbox" id="remove-console"> コンソール消す</label>
    <label><input type="checkbox" id="remove-empty" checked> 空白行消す</label>
</div>

<div class="main">
    <div class="pane">
        <div class="bar">INPUT <span id="in-count">0 lines</span></div>
        <div class="editor-container">
            <div class="line-numbers-wrapper"><div id="in-line-nums" class="line-numbers-content"></div></div>
            <textarea id="input-text" spellcheck="false" wrap="off" placeholder="Paste here..."></textarea>
        </div>
    </div>
    <div class="pane">
        <div class="bar">OUTPUT <span id="out-count">0 lines</span></div>
        <div class="editor-container">
            <div class="line-numbers-wrapper"><div id="out-line-nums" class="line-numbers-content"></div></div>
            <textarea id="output-text" readonly wrap="off" placeholder="Result..."></textarea>
        </div>
    </div>
</div>

<div class="footer">
    <button class="btn-main" id="exec-btn">実行する</button>
    <button class="btn-copy" id="copy-btn">結果をコピー</button>
</div>

<!-- コメント選択モーダル -->
<div id="modal-overlay">
    <div class="modal">
        <div class="modal-header">
            <h3 style="margin:0; font-size:14px;">削除するコメントを選択</h3>
            <label style="font-size:11px;"><input type="checkbox" id="select-all" checked> 全選択</label>
        </div>
        <div class="modal-body" id="comment-list">
            <!-- ここにコメント一覧が表示される -->
        </div>
        <div class="modal-footer">
            <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
            <button class="btn-main" id="confirm-remove">選択したものを削除して続行</button>
        </div>
    </div>
</div>

<script id="worker-script" type="text/javascript">
    self.onmessage = function(e) {
        const { code, options, selectedComments } = e.data;
        let metadata = "";
        let workingCode = code;
        
        // 1. メタデータ保護
        const metaRegex = /\/\/\s*==UserScript==[\s\S]*?\/\/\s*==\/UserScript==/;
        const metaMatch = code.match(metaRegex);
        if (metaMatch) {
            metadata = metaMatch[0];
            workingCode = code.replace(metaMatch[0], "___METADATA_PLACEHOLDER___");
        }

        // 2. コメント処理（選択削除の場合）
        if (selectedComments) {
            // 逆順で置換（位置がずれないように）
            selectedComments.sort((a,b) => b.start - a.start).forEach(comment => {
                const before = workingCode.substring(0, comment.start);
                const after = workingCode.substring(comment.end);
                workingCode = before + after;
            });
        }

        // 3. コンソール削除
        if (options.removeConsole) {
            workingCode = workingCode.replace(/console\.(log|debug|info|warn|error|dir|table|trace|group|groupEnd|time|timeEnd)\s*\([\s\S]*?\);?/g, "");
        }

        // 4. 行処理
        const lines = workingCode.split(/\r?\n/);
        const processed = [];
        let indentLevel = 0;
        const indentStr = "    ";

        for (let i = 0; i < lines.length; i++) {
            let line = lines[i].trim();
            if (line === "___METADATA_PLACEHOLDER___") {
                processed.push(metadata);
                continue;
            }
            if (options.removeEmpty && line === "") continue;

            if (options.fixLines) {
                const openBraces = (line.match(/\{/g) || []).length;
                const closeBraces = (line.match(/\}/g) || []).length;
                if (line.startsWith('}')) {
                    indentLevel = Math.max(0, indentLevel - 1);
                    processed.push(indentStr.repeat(indentLevel) + line);
                    indentLevel += openBraces - (closeBraces - 1);
                } else {
                    processed.push(indentStr.repeat(indentLevel) + line);
                    indentLevel += (openBraces - closeBraces);
                }
                if (indentLevel < 0) indentLevel = 0;
            } else {
                processed.push(lines[i]);
            }
        }

        let finalCode = processed.join('\n').trim();
        if (options.removeEmpty) finalCode = finalCode.replace(/\n\s*\n\s*\n/g, '\n\n');
        self.postMessage({ finalCode });
    };
</script>

<script>
    const inputArea = document.getElementById('input-text');
    const outputArea = document.getElementById('output-text');
    const inLineNums = document.getElementById('in-line-nums');
    const outLineNums = document.getElementById('out-line-nums');
    const execBtn = document.getElementById('exec-btn');
    const statusLabel = document.getElementById('status');
    const modal = document.getElementById('modal-overlay');
    const commentList = document.getElementById('comment-list');

    let detectedComments = [];

    // Worker設定
    const blob = new Blob([document.getElementById('worker-script').textContent], {type: 'text/javascript'});
    const worker = new Worker(window.URL.createObjectURL(blob));

    // コメント抽出用正規表現 (文字列内を除外)
    function findComments(text) {
        const comments = [];
        const regex = /\/\*[\s\S]*?\*\/|([^\\:]|^)\/\/.*$/gm;
        let match;
        // メタデータを除外した範囲で検索
        const metaRegex = /\/\/\s*==UserScript==[\s\S]*?\/\/\s*==\/UserScript==/;
        const metaMatch = text.match(metaRegex);
        const metaStart = metaMatch ? text.indexOf(metaMatch[0]) : -1;
        const metaEnd = metaMatch ? metaStart + metaMatch[0].length : -1;

        while ((match = regex.exec(text)) !== null) {
            if (match.index >= metaStart && match.index < metaEnd) continue;
            comments.push({
                start: match.index + (match[1] ? match[1].length : 0),
                end: regex.lastIndex,
                text: match[0].trim()
            });
        }
        return comments;
    }

    function updateLineNumbers(textarea, lineNumDiv, countElId) {
        const count = textarea.value.split('\n').length;
        let html = '';
        for (let i = 1; i <= count; i++) html += '<span>' + i + '</span>';
        lineNumDiv.innerHTML = html;
        document.getElementById(countElId).textContent = count.toLocaleString() + " lines";
    }

    function syncScroll(area, nums) {
        let ticking = false;
        area.addEventListener('scroll', () => {
            if (!ticking) {
                window.requestAnimationFrame(() => {
                    nums.style.transform = `translateY(${-area.scrollTop}px)`;
                    ticking = false;
                });
                ticking = true;
            }
        });
    }

    syncScroll(inputArea, inLineNums);
    syncScroll(outputArea, outLineNums);

    inputArea.addEventListener('input', () => updateLineNumbers(inputArea, inLineNums, 'in-count'));

    // 実行フロー
    execBtn.addEventListener('click', () => {
        const code = inputArea.value;
        if (!code.trim()) return;

        if (document.getElementById('remove-comments').checked) {
            detectedComments = findComments(code);
            if (detectedComments.length > 0) {
                showCommentModal();
                return;
            }
        }
        startProcessing(null);
    });

    function showCommentModal() {
        commentList.innerHTML = '';
        detectedComments.forEach((c, i) => {
            const div = document.createElement('div');
            div.className = 'comment-item';
            div.innerHTML = `
                <input type="checkbox" class="comment-chk" data-idx="${i}" checked>
                <div class="comment-text">${c.text.substring(0,100)}${c.text.length > 100 ? '...' : ''}</div>
            `;
            commentList.appendChild(div);
        });
        modal.style.display = 'flex';
    }

    function closeModal() { modal.style.display = 'none'; }

    document.getElementById('select-all').addEventListener('change', (e) => {
        document.querySelectorAll('.comment-chk').forEach(c => c.checked = e.target.checked);
    });

    document.getElementById('confirm-remove').addEventListener('click', () => {
        const toRemove = [];
        document.querySelectorAll('.comment-chk').forEach(chk => {
            if (chk.checked) toRemove.push(detectedComments[chk.dataset.idx]);
        });
        closeModal();
        startProcessing(toRemove);
    });

    function startProcessing(selectedComments) {
        execBtn.disabled = true;
        statusLabel.textContent = "Processing...";
        
        worker.postMessage({
            code: inputArea.value,
            options: {
                fixLines: document.getElementById('fix-lines').checked,
                removeConsole: document.getElementById('remove-console').checked,
                removeEmpty: document.getElementById('remove-empty').checked
            },
            selectedComments: selectedComments
        });
    }

    worker.onmessage = function(e) {
        outputArea.value = e.data.finalCode;
        updateLineNumbers(outputArea, outLineNums, 'out-count');
        outputArea.scrollTop = 0;
        outLineNums.style.transform = `translateY(0px)`;
        execBtn.disabled = false;
        statusLabel.textContent = "Done!";
        setTimeout(() => statusLabel.textContent = "Ready", 2000);
    };

    document.getElementById('copy-btn').addEventListener('click', () => {
        outputArea.select();
        document.execCommand('copy');
        alert("Copied!");
    });

    updateLineNumbers(inputArea, inLineNums, 'in-count');
</script>

</body>
</html>
