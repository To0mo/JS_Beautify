<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Userscript Formatter (JP Comment Filter)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.14.9/beautify.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jshint/2.13.6/jshint.min.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --primary: #3b82f6;
            --secondary: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --border: #334155;
            --editor-bg: #1e293b;
            --line-num-bg: #0f172a;
            --text-color: #f1f5f9;
            --lh: 20px;
        }
        body {
            height: 100vh; margin: 0; padding: 10px; overflow: hidden;
            font-family: 'Consolas', 'Monaco', monospace; background: var(--bg); color: var(--text-color);
            display: flex; flex-direction: column; box-sizing: border-box;
        }
        
        .header { display: flex; justify-content: space-between; margin-bottom: 10px; align-items: center; }
        .settings {
            background: #1e293b; padding: 8px; border-radius: 6px; border: 1px solid var(--border);
            display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 10px; align-items: center;
        }
        label { font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 5px; user-select: none; }
        
        #error-nav {
            display: none; background: rgba(239, 68, 68, 0.15); border: 1px solid var(--danger);
            border-radius: 6px; padding: 8px 12px; margin-bottom: 10px;
            align-items: center; gap: 15px; color: #fca5a5;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        .nav-controls { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
        .nav-btn {
            background: var(--danger); border: none; color: white; border-radius: 4px;
            width: 28px; height: 28px; cursor: pointer; font-weight: bold; display: flex;
            align-items: center; justify-content: center; transition: 0.2s;
        }
        .nav-btn:hover { background: #dc2626; }
        
        .error-info { display: flex; flex-direction: column; flex: 1; min-width: 0; }
        .error-msg { font-size: 13px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .fix-hint { font-size: 12px; color: #fbbf24; margin-top: 3px; display: flex; align-items: center; gap: 6px; font-weight: normal; }

        .main { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; flex: 1; min-height: 0; }
        .pane { display: flex; flex-direction: column; background: var(--editor-bg); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; position: relative; }
        .bar { padding: 5px 10px; background: #334155; font-size: 11px; font-weight: bold; color: #94a3b8; display: flex; justify-content: space-between; align-items: center; }
        
        .editor-container { flex: 1; position: relative; display: flex; overflow: hidden; }
        .line-numbers {
            width: 45px; background: var(--line-num-bg); border-right: 1px solid var(--border);
            text-align: right; padding: 10px 5px; font-size: 12px; line-height: var(--lh); color: #475569;
            user-select: none; overflow: hidden; white-space: pre;
        }
        .line-numbers div { height: var(--lh); }
        textarea {
            flex: 1; background: transparent; border: none; padding: 10px; color: inherit;
            font-family: inherit; font-size: 13px; line-height: var(--lh); resize: none; outline: none;
            white-space: pre; overflow: auto; tab-size: 4;
        }
        textarea::selection { background-color: rgba(220, 38, 38, 0.6); color: white; }

        .footer { padding-top: 10px; display: center; justify-content: center; gap: 10px; display: flex; }
        button.action-btn {
            padding: 10px 25px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; color: white; transition: 0.2s;
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        #exec-btn { background: var(--primary); }
        #exec-btn:hover:not(:disabled) { background: #2563eb; }
        #copy-btn { background: var(--secondary); }

        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 99; justify-content: center; align-items: center; }
        .modal-box { background: #1e293b; width: 90%; max-width: 600px; max-height: 80vh; display: flex; flex-direction: column; border-radius: 8px; border: 1px solid var(--border); }
        .modal-body { flex: 1; overflow-y: auto; padding: 10px; }
        .comment-row { display: flex; gap: 10px; padding: 8px; border-bottom: 1px solid #334155; font-size: 12px; align-items: flex-start; }
        .comment-text { white-space: pre-wrap; word-break: break-all; color: #94a3b8; flex: 1; }
        .modal-foot { padding: 10px; border-top: 1px solid #334155; display: flex; justify-content: space-between; gap: 10px; align-items: center; }
        .modal-btn-group { display: flex; gap: 10px; }
        .mini-btn { padding: 4px 8px; font-size: 10px; background: #475569; border: none; color: white; border-radius: 3px; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <h1 style="margin:0; font-size:16px; color:#e2e8f0;">Userscript Cleaner <span style="color:var(--primary); font-size:0.8em; margin-left:10px;">JP Comment Filter</span></h1>
</div>

<div class="settings">
    <label><input type="checkbox" id="fix-lines" checked> 行を正す</label>
    <label><input type="checkbox" id="remove-comments" checked> コメント削除</label>
    <label style="margin-left:-10px; color:var(--primary); opacity:0.9;"><input type="checkbox" id="only-jp"> (日本語のみ対象)</label>
    <label><input type="checkbox" id="remove-console"> コンソール消す</label>
    <label><input type="checkbox" id="remove-empty" checked> 空白行消す</label>
</div>

<div id="error-nav">
    <div class="nav-controls">
        <button class="nav-btn" title="前へ" onclick="prevError()">&#8592;</button>
        <span id="error-count" style="font-family:monospace; font-size:14px; min-width:45px; text-align:center;">0/0</span>
        <button class="nav-btn" title="次へ" onclick="nextError()">&#8594;</button>
    </div>
    <div class="error-info">
        <span id="error-msg" class="error-msg"></span>
        <span id="fix-hint" class="fix-hint"></span>
    </div>
</div>

<div class="main">
    <div class="pane">
        <div class="bar">INPUT <span id="in-lines">0 lines</span></div>
        <div class="editor-container">
            <div class="line-numbers" id="in-nums"><div>1</div></div>
            <textarea id="input" placeholder="ここにコードを貼り付けてください..." spellcheck="false"></textarea>
        </div>
    </div>
    <div class="pane">
        <div class="bar">OUTPUT <span id="out-lines">0 lines</span></div>
        <div class="editor-container">
            <div class="line-numbers" id="out-nums"><div>1</div></div>
            <textarea id="output" readonly placeholder="実行結果..." spellcheck="false"></textarea>
        </div>
    </div>
</div>

<div class="footer">
    <button id="exec-btn" class="action-btn">実行する</button>
    <button id="copy-btn" class="action-btn">結果をコピー</button>
</div>

<!-- Modal -->
<div id="modal">
    <div class="modal-box">
        <div class="bar" style="border-radius:8px 8px 0 0; padding:10px;">
            <span>削除するコメントを選択</span>
            <div style="display:flex; gap:10px;">
                <button class="mini-btn" id="sel-jp-btn">日本語のみ選択</button>
                <label><input type="checkbox" id="check-all" checked> 全選択/解除</label>
            </div>
        </div>
        <div class="modal-body" id="comment-list"></div>
        <div class="modal-foot">
            <span id="modal-count" style="font-size:11px; color:#94a3b8;"></span>
            <div class="modal-btn-group">
                <button class="action-btn" onclick="closeModal()" style="background:#475569">キャンセル</button>
                <button class="action-btn" id="confirm-del" style="background:var(--primary)">削除して続行</button>
            </div>
        </div>
    </div>
</div>

<script>
    const $ = id => document.getElementById(id);
    const input = $('input'), output = $('output');
    let detectedComments = [];
    let syntaxErrors = [];
    let currentErrorIndex = -1;

    // 日本語判定関数 (ASCII以外が含まれるか)
    const hasJP = (str) => /[^\x00-\x7F]/.test(str);

    // --- エラー翻訳/ヒント (省略なし) ---
    function translateError(msg, evidence) {
        if (!msg) return "不明なエラー";
        let translated = msg;
        if (msg.match(/'(.*)' is not defined/)) translated = msg.replace(/'(.*)' is not defined/, "変数 '$1' は定義されていません。");
        else if (msg.match(/'(.*)' is already defined/)) translated = msg.replace(/'(.*)' is already defined/, "変数 '$1' は既に定義されています。");
        else if (msg.match(/Expected '(.*)' and instead saw '(.*)'/)) translated = msg.replace(/Expected '(.*)' and instead saw '(.*)'/, "本来 '$1' があるべき場所に '$2' があります。");
        else if (msg.match(/Unexpected '(.*)'/)) translated = msg.replace(/Unexpected '(.*)'/, "ここに文字 '$1' は置けません。");
        else if (msg.match(/Unmatched '(.*)'/)) translated = msg.replace(/Unmatched '(.*)'/, "括弧 '$1' のペアが正しくありません。");
        else if (msg.match(/Missing semicolon/)) translated = "行末の ';' が抜けています。";
        return translated;
    }

    function generateFixHint(err) {
        const rawCode = err.evidence || "";
        if (rawCode.match(/[　]/)) return "全角スペースが含まれています。半角に直してください。";
        if (rawCode.match(/[：；，（）]/)) return "全角記号が含まれています。半角に直してください。";
        return "周辺の記号やスペルを確認してください。";
    }

    function updateErrorDisplay() {
        const nav = $('error-nav');
        if (syntaxErrors.length === 0) { nav.style.display = 'none'; return; }
        nav.style.display = 'flex';
        const err = syntaxErrors[currentErrorIndex];
        $('error-count').textContent = `${currentErrorIndex + 1} / ${syntaxErrors.length}`;
        $('error-msg').textContent = `Line ${err.line}: ${translateError(err.reason, err.evidence)}`;
        const hint = generateFixHint(err);
        $('fix-hint').innerHTML = hint ? `💡 ${hint}` : '';
        jumpToError(err);
    }

    function jumpToError(err) {
        input.focus();
        const lineHeight = 20; 
        const scrollPos = (err.line - 1) * lineHeight - (input.clientHeight / 2);
        input.scrollTop = scrollPos;
        const lines = input.value.split('\n');
        let charIndex = 0;
        for (let i = 0; i < err.line - 1; i++) charIndex += lines[i].length + 1; 
        input.setSelectionRange(charIndex, charIndex + (lines[err.line - 1] || "").length);
    }

    function prevError() { currentErrorIndex = (currentErrorIndex - 1 + syntaxErrors.length) % syntaxErrors.length; updateErrorDisplay(); }
    function nextError() { currentErrorIndex = (currentErrorIndex + 1) % syntaxErrors.length; updateErrorDisplay(); }

    // --- メイン処理 ---
    async function startProcess() {
        const code = input.value;
        if (!code.trim()) return;

        $('exec-btn').disabled = true;
        $('error-nav').style.display = 'none';
        syntaxErrors = [];

        JSHINT(code, { esversion: 11, browser: true, devel: true, asi: true, undef: false });
        const criticalErrors = JSHINT.errors.filter(e => e && e.code && e.code.startsWith('E'));

        if (criticalErrors.length > 0) {
            syntaxErrors = criticalErrors;
            currentErrorIndex = 0;
            updateErrorDisplay();
            $('exec-btn').disabled = false;
            return;
        }

        if ($('remove-comments').checked) {
            detectedComments = findComments(code);
            if (detectedComments.length > 0) {
                showModal();
                $('exec-btn').disabled = false;
                return;
            }
        }
        processFormatting(null);
    }

    async function processFormatting(selectedComments) {
        $('exec-btn').disabled = true;
        try {
            let workingCode = input.value;
            const metaMatch = workingCode.match(/\/\/\s*==UserScript==[\s\S]*?\/\/\s*==\/UserScript==/);
            const PLACEHOLDER = "/*__META_PROTECT__*/";
            let metadata = "";
            if (metaMatch) {
                metadata = metaMatch[0];
                workingCode = workingCode.replace(metadata, PLACEHOLDER);
            }

            if (selectedComments) {
                selectedComments.sort((a,b) => b.start - a.start).forEach(c => {
                    workingCode = workingCode.substring(0, c.start) + workingCode.substring(c.end);
                });
            }

            if ($('remove-console').checked) {
                workingCode = workingCode.replace(/console\.(log|debug|info|warn|error|dir|table|trace)\s*\([\s\S]*?\);?/g, "");
            }

            if ($('fix-lines').checked) {
                workingCode = js_beautify(workingCode, { indent_size: 4, brace_style: "collapse,preserve-inline" });
            }

            if (metadata) workingCode = workingCode.replace(PLACEHOLDER, metadata);
            if ($('remove-empty').checked) workingCode = workingCode.replace(/^\s*[\r\n]/gm, "");

            output.value = workingCode.trim();
            updateUI();
        } catch (e) { alert(e.message); }
        $('exec-btn').disabled = false;
    }

    function findComments(text) {
        const list = [];
        const metaRegex = /\/\/\s*==UserScript==[\s\S]*?\/\/\s*==\/UserScript==/;
        const metaMatch = text.match(metaRegex);
        const mStart = metaMatch ? metaMatch.index : -1;
        const mEnd = metaMatch ? mStart + metaMatch[0].length : -1;
        
        const regex = /\/\*[\s\S]*?\*\/|([^\\:]|^)\/\/.*$/gm;
        let match;
        while ((match = regex.exec(text)) !== null) {
            let start = match.index + (match[1] ? match[1].length : 0);
            if (start >= mStart && start < mEnd) continue;
            const commentText = match[0].trim();
            list.push({ start, end: regex.lastIndex, text: commentText, isJP: hasJP(commentText) });
        }
        return list;
    }

    function showModal() {
        const list = $('comment-list');
        list.innerHTML = "";
        const onlyJPFilter = $('only-jp').checked;
        
        let count = 0;
        detectedComments.forEach((c, i) => {
            if (onlyJPFilter && !c.isJP) return;
            const row = document.createElement('div');
            row.className = 'comment-row';
            row.innerHTML = `<input type="checkbox" class="cmt-chk" checked data-idx="${i}" data-jp="${c.isJP}"><div class="comment-text">${c.text.substring(0,150)}</div>`;
            list.appendChild(row);
            count++;
        });

        $('modal-count').textContent = `対象: ${count} 件`;
        $('modal').style.display = "flex";
    }

    $('sel-jp-btn').onclick = () => {
        document.querySelectorAll('.cmt-chk').forEach(cb => {
            cb.checked = (cb.dataset.jp === "true");
        });
    };

    $('check-all').onclick = (e) => {
        document.querySelectorAll('.cmt-chk').forEach(cb => cb.checked = e.target.checked);
    };

    $('confirm-del').onclick = () => {
        const toRemove = [];
        document.querySelectorAll('.cmt-chk:checked').forEach(el => toRemove.push(detectedComments[el.dataset.idx]));
        closeModal();
        processFormatting(toRemove);
    };

    function closeModal() { $('modal').style.display = "none"; }
    $('exec-btn').onclick = startProcess;
    $('copy-btn').onclick = () => {
        output.select(); document.execCommand('copy');
        const b = $('copy-btn'); b.textContent = "Copied!"; setTimeout(() => b.textContent = "結果をコピー", 1500);
    };

    function updateUI() {
        countLines(input, $('in-lines'), $('in-nums'));
        countLines(output, $('out-lines'), $('out-nums'));
    }

    function countLines(textarea, label, numsDiv) {
        const count = textarea.value.split('\n').length;
        label.textContent = count.toLocaleString() + " lines";
        let h = "";
        const limit = Math.min(count, 5000); 
        for(let i=1; i<=limit; i++) h += `<div>${i}</div>`;
        if(count > 5000) h += `<div>...</div>`;
        numsDiv.innerHTML = h;
    }

    const sync = (src, dst) => src.onscroll = () => dst.scrollTop = src.scrollTop;
    sync(input, $('in-nums')); sync(output, $('out-nums'));
    input.oninput = updateUI;
</script>
</body>
</html>
